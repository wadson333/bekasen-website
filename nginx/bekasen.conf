# Nginx vhost for Bekasen production.
# Place at /etc/nginx/sites-available/bekasen.conf and symlink into
# /etc/nginx/sites-enabled/, then: nginx -t && systemctl reload nginx.
#
# TLS certs come from certbot (Let's Encrypt):
#   certbot --nginx -d bekasen.com -d www.bekasen.com
#
# Assumes the docker-compose stack exposes the Next.js container on
# 127.0.0.1:3000 (uncomment the ports stanza in docker-compose.yml).
# If running Nginx as a sibling container instead, swap upstream to the
# `web` service name and put Nginx on the `bekasen-net` network.

# ─── Rate limit zones ────────────────────────────────────────────────────────
# 10MB ≈ 160k IPs. Admin endpoints are more aggressive than public ones.
limit_req_zone $binary_remote_addr zone=bekasen_public:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=bekasen_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=bekasen_admin:10m rate=5r/s;
# Per-IP connection cap.
limit_conn_zone $binary_remote_addr zone=bekasen_conn:10m;

upstream bekasen_app {
    # 127.0.0.1:3000 when Nginx runs on the host.
    server 127.0.0.1:3000 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect + ACME challenge ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bekasen.com www.bekasen.com;

    # Let's Encrypt webroot challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Apex (HTTPS) ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bekasen.com www.bekasen.com;

    # certbot fills these in:
    ssl_certificate     /etc/letsencrypt/live/bekasen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bekasen.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Hardening headers ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP is intentionally loose for the public site (Cal.com embed +
    # Unsplash images). Tighten further once those are pinned.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://app.cal.com https://cal.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://app.cal.com https://cal.com https://openrouter.ai; frame-src https://app.cal.com https://cal.com; frame-ancestors 'none';" always;
    add_header X-Frame-Options "DENY" always;

    # ─── Limits ───────────────────────────────────────────────────────────
    limit_conn bekasen_conn 50;
    client_max_body_size 5m;
    client_body_buffer_size 16k;
    client_header_timeout 10s;
    client_body_timeout 15s;

    # Hide server fingerprint.
    server_tokens off;

    # ─── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Static caching for Next assets ──────────────────────────────────
    # Cache the immutable bundle (chunks have hashed filenames). Avoid
    # caching index.html-like routes (handled by the upstream).
    location /_next/static/ {
        proxy_pass http://bekasen_app;
        proxy_cache_valid 200 1y;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(?:png|jpg|jpeg|gif|svg|webp|avif|ico|woff2?|ttf|otf)$ {
        proxy_pass http://bekasen_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── Admin panel (constant-time UID gate handled by the app) ─────────
    # Tight rate limit because login/2FA endpoints live here.
    location ~ ^/panel/ {
        limit_req zone=bekasen_admin burst=10 nodelay;
        proxy_pass http://bekasen_app;
        include /etc/nginx/snippets/bekasen-proxy.conf;
    }

    # ─── Auth APIs (stricter) ────────────────────────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=bekasen_admin burst=10 nodelay;
        proxy_pass http://bekasen_app;
        include /etc/nginx/snippets/bekasen-proxy.conf;
    }

    # ─── Other APIs (medium) ─────────────────────────────────────────────
    location ~ ^/api/ {
        limit_req zone=bekasen_api burst=20 nodelay;
        proxy_pass http://bekasen_app;
        include /etc/nginx/snippets/bekasen-proxy.conf;
    }

    # ─── Public site (default) ───────────────────────────────────────────
    location / {
        limit_req zone=bekasen_public burst=50 nodelay;
        proxy_pass http://bekasen_app;
        include /etc/nginx/snippets/bekasen-proxy.conf;
    }
}
